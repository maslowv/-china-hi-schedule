<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Побажання по графіку</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;500&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #1a1a1a;
    --border: #2a2a2a;
    --text: #f0ece4;
    --muted: #666;
    --accent: #c8f060;
    --accent-dark: #8fb82a;
    --accent-bg: rgba(200,240,96,0.08);
    --red: #ff5a5a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 24px;
  }

  /* HEATMAP */
  .heatmap-wrap {
    overflow-x: auto;
    margin-bottom: 32px;
    padding-bottom: 8px;
  }

  .heatmap {
    display: grid;
    min-width: max-content;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .hm-row {
    display: flex;
    border-bottom: 1px solid var(--border);
  }
  .hm-row:last-child { border-bottom: none; }

  .hm-name {
    width: 90px;
    min-width: 90px;
    padding: 8px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    border-right: 1px solid var(--border);
    display: flex;
    align-items: center;
    background: var(--surface);
  }

  .hm-header-name {
    background: #111;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-family: 'Unbounded', sans-serif;
  }

  .hm-cell {
    width: 32px;
    min-width: 32px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    border-right: 1px solid var(--border);
    color: var(--muted);
    position: relative;
    transition: background 0.15s;
  }
  .hm-cell:last-child { border-right: none; }

  .hm-cell.weekend { color: #ff7a7a; }
  .hm-cell.wished {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 500;
  }
  .hm-cell.wished::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 16px;
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
  }

  .hm-header .hm-cell {
    background: #111;
    height: 28px;
    font-size: 10px;
    font-weight: 400;
    color: var(--muted);
  }
  .hm-header .hm-cell.weekend { color: #ff7a7a; }

  /* MONTH NAV */
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .month-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 13px;
    font-weight: 400;
    flex: 1;
  }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 6px 12px;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: #222; }

  /* FORM */
  .form-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
  }

  .form-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .field-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
    display: block;
  }

  select {
    width: 100%;
    background: #111;
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    margin-bottom: 20px;
    appearance: none;
    cursor: pointer;
    outline: none;
  }
  select:focus { border-color: var(--accent); }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
    margin-bottom: 20px;
  }

  .day-btn {
    aspect-ratio: 1;
    background: #111;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1px;
    font-family: 'Inter', sans-serif;
  }
  .day-btn .day-num { font-weight: 500; font-size: 13px; }
  .day-btn .day-dow { font-size: 9px; opacity: 0.6; }
  .day-btn:hover { border-color: #444; background: #1a1a1a; }
  .day-btn.weekend { color: #ff7a7a; }
  .day-btn.selected {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0e0e0e;
    border: none;
    border-radius: 12px;
    font-family: 'Unbounded', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 400;
  }
  .submit-btn:hover { background: #d4f570; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled {
    background: #2a2a2a;
    color: var(--muted);
    cursor: default;
    transform: none;
  }

  .toast {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--accent-bg);
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-size: 13px;
    display: none;
    text-align: center;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }

  .count-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .count-badge span {
    background: var(--accent-bg);
    color: var(--accent);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    font-weight: 500;
  }
</style>
</head>
<body>

<h1>🏮 Побажання по графіку</h1>

<div class="month-nav">
  <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
  <div class="month-title" id="month-title"></div>
  <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
</div>

<div class="count-badge" id="count-badge"></div>

<div class="heatmap-wrap">
  <div class="heatmap" id="heatmap"></div>
</div>

<hr class="divider">

<div class="form-section">
  <p class="form-title">Надіслати прохання</p>

  <label class="field-label">Хто ти?</label>
  <select id="who" onchange="updateBtn()">
    <option value="">— обери себе —</option>
  </select>

  <label class="field-label">Які дні потрібні?</label>
  <div class="days-grid" id="days-grid"></div>

  <button class="submit-btn" id="submit-btn" onclick="submitWish()" disabled>Надіслати</button>
  <div class="toast" id="toast">Збережено! Менеджер побачить ✓</div>
</div>

<script>
  const NAMES = ["Саша Снітко","Максим Фещенко","Влад Максименко","Марічка Буткевич","Олег","Дарина","Тетяна","Андрій","Юлія"];
  const UA_MONTHS = ["Січень","Лютий","Березень","Квітень","Травень","Червень","Липень","Серпень","Вересень","Жовтень","Листопад","Грудень"];
  const DOW_SHORT = ["Нд","Пн","Вт","Ср","Чт","Пт","Сб"];

  const now = new Date();
  let cur = { y: now.getFullYear(), m: now.getMonth() };
  let wishes = {};
  let selected = new Set();

  const sel = document.getElementById('who');
  NAMES.forEach(n => {
    const o = document.createElement('option');
    o.value = n; o.textContent = n;
    sel.appendChild(o);
  });

  function k(y, m) { return y + '_' + m; }
  function daysIn(y, m) { return new Date(y, m + 1, 0).getDate(); }
  function isWE(y, m, d) { const dow = new Date(y, m, d).getDay(); return dow === 0 || dow === 6; }

  function changeMonth(dir) {
    cur.m += dir;
    if (cur.m > 11) { cur.m = 0; cur.y++; }
    if (cur.m < 0) { cur.m = 11; cur.y--; }
    selected.clear();
    render();
  }

  function render() {
    renderHeatmap();
    renderDays();
    updateBtn();
    updateCount();
  }

  function updateCount() {
    const w = wishes[k(cur.y, cur.m)] || {};
    const total = Object.values(w).reduce((s, days) => s + days.length, 0);
    const people = Object.keys(w).length;
    const el = document.getElementById('count-badge');
    el.innerHTML = people > 0
      ? 'Подали прохання: <span>' + people + ' з ' + NAMES.length + '</span>'
      : '<span style="color:var(--muted)">Поки ніхто не подав</span>';
  }

  function renderHeatmap() {
    const { y, m } = cur;
    const days = daysIn(y, m);
    const w = wishes[k(y, m)] || {};
    document.getElementById('month-title').textContent = UA_MONTHS[m] + ' ' + y;

    let html = '';

    // header row
    html += '<div class="hm-row hm-header"><div class="hm-name hm-header-name">Офіціант</div>';
    for (let d = 1; d <= days; d++) {
      const we = isWE(y, m, d);
      html += '<div class="hm-cell' + (we ? ' weekend' : '') + '">' + d + '</div>';
    }
    html += '</div>';

    NAMES.forEach(name => {
      const wished = w[name] || [];
      html += '<div class="hm-row"><div class="hm-name">' + name + '</div>';
      for (let d = 1; d <= days; d++) {
        const isWished = wished.includes(d);
        const we = isWE(y, m, d);
        html += '<div class="hm-cell' + (isWished ? ' wished' : '') + (we && !isWished ? ' weekend' : '') + '">' + (isWished ? '✓' : '') + '</div>';
      }
      html += '</div>';
    });

    document.getElementById('heatmap').innerHTML = html;
  }

  function renderDays() {
    const { y, m } = cur;
    const days = daysIn(y, m);
    let html = '';
    for (let d = 1; d <= days; d++) {
      const dow = new Date(y, m, d).getDay();
      const we = isWE(y, m, d);
      const isSel = selected.has(d);
      html += '<button class="day-btn' + (we ? ' weekend' : '') + (isSel ? ' selected' : '') + '" onclick="toggleDay(' + d + ')">'
        + '<span class="day-num">' + d + '</span>'
        + '<span class="day-dow">' + DOW_SHORT[dow] + '</span>'
        + '</button>';
    }
    document.getElementById('days-grid').innerHTML = html;
  }

  function toggleDay(d) {
    if (selected.has(d)) selected.delete(d);
    else selected.add(d);
    renderDays();
    updateBtn();
  }

  function updateBtn() {
    const who = document.getElementById('who').value;
    document.getElementById('submit-btn').disabled = !who || selected.size === 0;
  }

  function submitWish() {
    const who = document.getElementById('who').value;
    const { y, m } = cur;
    const key = k(y, m);
    if (!wishes[key]) wishes[key] = {};
    wishes[key][who] = Array.from(selected).sort((a, b) => a - b);
    selected.clear();
    document.getElementById('who').value = '';
    render();
    const t = document.getElementById('toast');
    t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }

  render();
</script>
</body>
</html>
